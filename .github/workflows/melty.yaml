name: Meltano Pipeline

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - logging/**
      - meltano.yml
      - pyproject.toml
      - plugins/**/*
      - transform/models/**/*.sql
      - transform/models/**/*.yml
      - .github/workflows/melty.yaml
      - quarto/**/*.qmd
      - quarto/_quarto.yml
      - quarto/requirements.txt
  push:
    branches: [main]
    paths:
      - logging/**
      - meltano.yml
      - pyproject.toml
      - plugins/**/*
      - transform/models/**/*.sql
      - transform/models/**/*.yml
      - .github/workflows/melty.yaml
      - quarto/**/*.qmd
      - quarto/_quarto.yml
      - quarto/requirements.txt
  workflow_dispatch:
    inputs:
      environment:
        description: Meltano Environment
        required: true
        default: prod
      logConfig:
        description: "Logging configuration file"
        required: true
        default: "logging/dev.yaml"
        type: choice
        options:
          - logging/dev.yaml
  schedule:
    - cron: "0 12 * * *" # Once a day around 6am CST (12am UTC)

env:
  DUCKDB_PATH: ${{ secrets.DUCKDB_PATH }}
  FORCE_COLOR: "1"
  HEALTHCHECK_ID: ${{ secrets.HEALTHCHECK_ID }}
  MELTANO_CLI_LOG_CONFIG: "logging/prod.yaml"
  MELTANO_DATABASE_URI: ${{ secrets.MELTANO_DATABASE_URI }}
  MELTANO_ENVIRONMENT: ${{ github.event.inputs.environment || 'prod' }}
  MELTANO_RUN_TIMEOUT: 600
  MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
  PYTHONWARNINGS: >
    error,
    once:No GlobalOverrides context is active:UserWarning,
    once:codecs.open() is deprecated. Use open() instead.:DeprecationWarning
  # renovate: datasource=github-tags depName=apple/pkl
  PKL_VERSION: 0.31.1

concurrency:
  group: meltano
  cancel-in-progress: true

jobs:
  pkl:
    name: Check stale Pkl output
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Pkl
        uses: pkl-community/setup-pkl@0bffd1602015ccf46333e880f81087e73fd1a361 # v0.0.9
        with:
          pkl-version: ${{ env.PKL_VERSION }}

      - name: Check stale pkl output
        run: pkl eval pkl/main.pkl --format=yaml > meltano.yml

      - name: Check if meltano.yml is different
        run: git diff --exit-code meltano.yml

  ping-start:
    name: Ping the start of the pipeline
    runs-on: ubuntu-24.04
    needs: [pkl]
    steps:
      - name: Ping
        env:
          EVENT_NAME: ${{ github.event_name }}
        # Only ping the start of the pipeline if the event is a scheduled run or a push to main
        run: |
          if [ "$EVENT_NAME" == "schedule" ] || [ "$EVENT_NAME" == "push" ]; then
            curl "https://hc-ping.com/$HEALTHCHECK_ID/start"
          fi

  meltano-run:
    name: "Meltano Job: ${{ matrix.job }}"
    runs-on: ubuntu-24.04
    needs: [ping-start]
    continue-on-error: true
    container:
      image: ghcr.io/meltano/meltano:latest-python3.14-slim # zizmor: ignore[unpinned-images]
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_IO_TOKEN }}
      env:
        TAP_GITHUB_AUTH_TOKEN: ${{ secrets.TAP_GITHUB_AUTH_TOKEN }}
        TAP_READTHEDOCS_TOKEN: ${{ secrets.TAP_READTHEDOCS_TOKEN }}
        TAP_STACKEXCHANGE_KEY: ${{ secrets.TAP_STACKEXCHANGE_KEY }}
        TARGET_DUCKDB_PATH: ${{ secrets.TARGET_DUCKDB_PATH }}
    strategy:
      fail-fast: false
      matrix:
        job:
          # - "pocket-to-duckdb" # Pocket has been phased out :(
          - "stackoverflow-to-duckdb"
          - "rtd-to-duckdb"
          - "gh-to-duckdb"
          - "pypistats-to-duckdb"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check Meltano
        run: |
          meltano --version

      - name: Install plugins
        env:
          MELTANO_JOB_NAME: ${{ matrix.job }}
        run: |
          meltano run --only-install "$MELTANO_JOB_NAME"

      - name: Run
        env:
          MELTANO_FF_STRICT_ENV_VAR_MODE: true
          MELTANO_JOB_NAME: ${{ matrix.job }}
        run: |
          meltano run --no-install "$MELTANO_JOB_NAME"

      - name: Upload Meltano log
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meltano-${{ matrix.job }}
          path: logs/meltano.log

  lint:
    name: Lint models
    runs-on: ubuntu-24.04
    continue-on-error: true
    needs: [ping-start]
    container:
      image: ghcr.io/meltano/meltano:latest-python3.14-slim # zizmor: ignore[unpinned-images]
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_IO_TOKEN }}
      env:
        DUCKDB_PATH: ${{ secrets.DUCKDB_PATH }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check Meltano
        run: |
          meltano --version

      - name: Lint
        env:
          MELTANO_CLI_LOG_LEVEL: info
        run: |
          meltano invoke dbt:lint --profiles-dir transform/profiles/duckdb/ --project-dir transform

  transform:
    name: Data Transformation with dbt-duckdb
    runs-on: ubuntu-24.04
    needs: [meltano-run, lint]
    container:
      image: ghcr.io/meltano/meltano:latest-python3.14-slim # zizmor: ignore[unpinned-images]
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_IO_TOKEN }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check Meltano
        run: |
          meltano --version

      - name: Transform and Test
        run: |
          meltano run dbt-duckdb:build

  build-quarto:
    name: Build Quarto site
    needs: [transform]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: quarto/requirements.txt

      - name: Install Python dependencies
        run: |
          uv venv quarto/.venv
          uv pip install --python quarto/.venv/bin/python -r quarto/requirements.txt

      - uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2.2.0

      - name: Render Quarto site
        env:
          QUARTO_PYTHON: ${{ github.workspace }}/quarto/.venv/bin/python
        run: |
          quarto render quarto

      - name: Upload Quarto build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quarto-build
          path: quarto/_site

  deploy-quarto:
    name: Deploy Quarto site
    needs: [build-quarto]
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write # Update the PR with the Vercel preview URL if this is a PR run
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set Git config
        run: |
          git config --global --add safe.directory /__w/meltano-dataops/meltano-dataops

      - name: Download Quarto build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: quarto-build
          path: quarto/_site

      - name: Deploy
        uses: amondnet/vercel-action@de09aeac2ace6599ec9b11ef87558759a496bac4 # v42.3.0
        with:
          github-comment: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-project-name: Meltano Dogfood Project
          vercel-args: ${{ case(github.event_name == 'pull_request', '', '--prod') }}

  ping-end:
    name: Ping the end of the pipeline
    runs-on: ubuntu-24.04
    needs: [deploy-quarto]
    if: github.event_name == 'schedule' || github.event_name == 'push'
    steps:
      - name: Ping
        run: |
          curl "https://hc-ping.com/$HEALTHCHECK_ID"
