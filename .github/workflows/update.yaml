name: Meltano Lock Update

on:
  schedule:
  - cron: '0 12 * * *'
  workflow_dispatch: {}

env:
  MELTANO_CLI_LOG_LEVEL: ${{ github.event.inputs.logLevel || 'warning' }}

permissions:
  contents: write
  pull-requests: write

jobs:
  meltano-lock:
    name: Meltano Lock Update
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/meltano/meltano:latest-python3.14-slim
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_IO_TOKEN }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Check Meltano
      run: |
        meltano --version

    - name: Meltano Lock Update
      run: |
        meltano lock --update

    - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      id: generate-token
      with:
        app-id: ${{ vars.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      with:
        token: ${{ steps.generate-token.outputs.token }}
        title: 'chore: Update Meltano Plugins'
        branch: meltano-lock-update
        commit-message: 'chore: Update Meltano Plugins'
        delete-branch: true
        reviewers: edgarrmondragon
        assignees: edgarrmondragon
        body: |
          Created with `meltano lock --update --all`
        labels: |
          dependencies
          Test/ELTP
