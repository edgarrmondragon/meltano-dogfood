version: 2

sources:
  - name: pocket
    schema: tap_getpocket
    loader: tap-pocket
    description: Content that's personalized to your interests
    tables:
      - name: items
        description: All Pocket list items
        columns:
          - name: item_id
            data_tests: [not_null, unique]
          - name: given_title
          - name: given_url
            data_tests: [not_null]
          - name: time_added
            data_tests: [not_null]
          - name: time_read
          - name: time_updated
          - name: tags
          - name: word_count
          - name: time_to_read

        config:
          loaded_at_field: time_updated
    config:
      tags:
        - Meltano SDK
models:
  - name: items
    description: Pocket items
  - name: tags
    identifier: tags
    description: Pocket item tags
  - name: authors
    description: Authors

exposures:
  - name: pocket_reads
    type: dashboard
    owner:
      name: me
      email: edgarrm358@gmail.com
    depends_on:
      - ref('items')
      - ref('tags')
      - ref('authors')
    url: https://meltano-dataops.vercel.app/reads
    maturity: medium
    description: Pending and recent reads, as well as some stats
